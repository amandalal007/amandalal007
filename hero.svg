    <text x="28" y="72" fill="#58a6ff" font-weight="bold">aman@phishguard</text>
    <text x="196" y="72" fill="#8b949e">:</text>
    <text x="208" y="72" fill="#3fb950">~</text>
    <text x="224" y="72" fill="#c9d1d9">$ whoami</text>
    <text x="48" y="98" fill="#3fb950" font-weight="bold">&gt; Aman Dalal — cybersecurity engineer &amp; threat-tool builder</text>

    <!-- focus -->
    <text x="28" y="134" fill="#58a6ff" font-weight="bold">aman@phishguard</text>
    <text x="196" y="134" fill="#8b949e">:</text>
    <text x="208" y="134" fill="#3fb950">~</text>
    <text x="224" y="134" fill="#c9d1d9">$ cat focus.txt</text>
    <text x="48" y="160" fill="#3fb950" font-weight="bold">&gt; defensive security tooling</text>
    <text x="48" y="184" fill="#8b949e">ML phishing detection · scam/fraud intel · recon automation</text>
    <text x="48" y="208" fill="#3fb950" font-weight="bold">&gt; hands-on TryHackMe</text>
    <text x="48" y="232" fill="#8b949e">red/blue team labs, ranked operator</text>
    <text x="48" y="256" fill="#3fb950" font-weight="bold">&gt; also ships full-stack</text>
    <text x="48" y="280" fill="#8b949e">Node.js · Java · web apps</text>

    <!-- projects -->
    <text x="28" y="316" fill="#58a6ff" font-weight="bold">aman@phishguard</text>
    <text x="196" y="316" fill="#8b949e">:</text>
    <text x="208" y="316" fill="#3fb950">~</text>
