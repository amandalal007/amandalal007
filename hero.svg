<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05070d"/>
      <stop offset="0.5" stop-color="#0a0f1c"/>
      <stop offset="1" stop-color="#070b14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#1e90ff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#00e5ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="0.5" stop-color="#3d7aed"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="txt" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7df9ff"/>
      <stop offset="1" stop-color="#c08bff"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#15233b" stroke-width="1"/>
    </pattern>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- bg -->
  <rect width="1000" height="380" fill="url(#bg)"/>
  <rect width="1000" height="380" fill="url(#grid)" opacity="0.6"/>
  <rect width="1000" height="380" fill="url(#glow)"/>

  <!-- moving scanline -->
  <rect x="0" y="0" width="1000" height="3" fill="#00e5ff" opacity="0.5">
    <animate attributeName="y" values="-10;380" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- orbital rings -->
  <g transform="translate(820,90)" opacity="0.8">
    <circle r="70" fill="none" stroke="url(#neon)" stroke-width="1.5" stroke-dasharray="6 10">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle r="48" fill="none" stroke="#a855f7" stroke-width="1" stroke-dasharray="3 8" opacity="0.7">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="#00e5ff" filter="url(#blur)"/>
    <circle r="3" fill="#fff"/>
  </g>

  <!-- left content: name -->
  <text x="60" y="120" fill="url(#txt)" font-size="46" font-weight="bold" letter-spacing="2">AMAN DALAL</text>
  <text x="62" y="152" fill="#5f7591" font-size="16" letter-spacing="1">CYBERSECURITY ENGINEER · THREAT-TOOL BUILDER</text>

  <!-- neon divider -->
  <rect x="60" y="170" width="420" height="2" fill="url(#neon)"/>
  <rect x="60" y="170" width="420" height="2" fill="url(#neon)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- typed terminal lines -->
  <g font-size="15" fill="#9fe8ff">
    <text x="62" y="210" fill="#3d7aed" font-weight="bold">root@phishguard</text>
    <text x="220" y="210" fill="#5f7591">:~$</text>
    <text x="236" y="210" fill="#cfe9ff">./scan --identity</text>

    <text x="80" y="238" fill="#39ff9d">▸ building defensive security tooling</text>
    <text x="80" y="262" fill="#39ff9d">▸ ML phishing detection · VirusTotal · RDAP</text>
    <text x="80" y="286" fill="#39ff9d">▸ TryHackMe red/blue operator · full-stack dev</text>

    <!-- cursor -->
    <rect x="80" y="300" width="9" height="16" fill="#39ff9d">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- status pills bottom -->
  <g font-size="12" font-weight="bold">
    <rect x="60" y="330" width="190" height="24" rx="12" fill="#0c1a12" stroke="#27c93f" stroke-width="1"/>
    <circle cx="80" cy="342" r="5" fill="#27c93f">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="94" y="346" fill="#39ff9d">OPEN TO SECURITY ROLES</text>

    <rect x="262" y="330" width="150" height="24" rx="12" fill="#1a1320" stroke="#a855f7" stroke-width="1"/>
    <circle cx="282" cy="342" r="5" fill="#a855f7">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <text x="296" y="346" fill="#d8b4ff">TRYHACKME ACTIVE</text>
  </g>
</svg>
