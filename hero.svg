<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 440" font-family="'JetBrains Mono',Consolas,Monaco,ui-monospace,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#090c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="0.5" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <radialGradient id="haze" cx="0.8" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="940" height="440" rx="12" fill="url(#bg)"/>
  <rect width="940" height="440" rx="12" fill="url(#grid)" opacity="0.5"/>
  <rect width="940" height="440" rx="12" fill="url(#haze)"/>
  <rect x="1" y="1" width="938" height="438" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- left accent bar -->
  <rect x="1" y="1" width="5" height="438" rx="2" fill="url(#accent)"/>

  <!-- title bar -->
  <rect x="0" y="0" width="940" height="36" rx="12" fill="#11161f"/>
  <rect x="0" y="20" width="940" height="16" fill="#11161f"/>
  <circle cx="24" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="18" r="6" fill="#27c93f"/>
  <text x="470" y="23" fill="#8b949e" font-size="13" text-anchor="middle" letter-spacing="0.5">aman@phishguard — ~/profile</text>

