<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 410" font-family="'JetBrains Mono',Consolas,Monaco,ui-monospace,monospace">
  <rect width="920" height="410" fill="#0d1117"/>
  <rect width="920" height="410" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- window chrome -->
  <rect x="0" y="0" width="920" height="34" fill="#161b22"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="6" fill="#27c93f"/>
  <text x="460" y="22" fill="#8b949e" font-size="13" text-anchor="middle">aman@phishguard: ~/profile</text>

  <g font-size="15" letter-spacing="0.2">
