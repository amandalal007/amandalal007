<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="'JetBrains Mono','Fira Code',Consolas,Monaco,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e17"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3d7aed"/>
      <stop offset="1" stop-color="#00e5ff"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1b2230" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1000" height="430" fill="url(#bg)"/>
  <rect width="1000" height="430" fill="url(#grid)" opacity="0.5"/>

  <!-- glow orb -->
  <circle cx="850" cy="80" r="120" fill="#3d7aed" opacity="0.10" filter="url(#glow)"/>
  <circle cx="120" cy="360" r="90" fill="#00e5ff" opacity="0.08" filter="url(#glow)"/>

  <!-- terminal window -->
  <rect x="60" y="55" width="880" height="320" rx="14" fill="#0d1117" stroke="#243047" stroke-width="1.5"/>
  <!-- title bar -->
  <rect x="60" y="55" width="880" height="38" rx="14" fill="#11161f"/>
  <rect x="60" y="79" width="880" height="14" fill="#11161f"/>
  <circle cx="86" cy="74" r="6" fill="#ff5f56"/>
  <circle cx="106" cy="74" r="6" fill="#ffbd2e"/>
  <circle cx="126" cy="74" r="6" fill="#27c93f"/>
  <text x="500" y="79" fill="#5b6678" font-size="13" text-anchor="middle">aman@phishguard — zsh — 80x24</text>

  <!-- body text -->
  <g fill="#c9d4e3" font-size="17">
    <!-- line 1 -->
    <g opacity="0">
      <text x="84" y="130" fill="#3d7aed" font-weight="bold">aman@phishguard</text>
      <text x="250" y="130" fill="#5b6678">:</text>
      <text x="262" y="130" fill="#00e5ff">~</text>
      <text x="278" y="130" fill="#c9d4e3">$ whoami</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
    </g>
    <!-- line 2 -->
    <g opacity="0">
      <text x="104" y="160" fill="#39d353" font-weight="bold">&gt; AMAN DALAL</text>
      <text x="270" y="160" fill="#8b98ad">— cybersecurity &amp; full-stack builder</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </g>
    <!-- line 3 -->
    <g opacity="0">
      <text x="84" y="200" fill="#3d7aed" font-weight="bold">aman@phishguard</text>
      <text x="250" y="200" fill="#5b6678">:</text>
      <text x="262" y="200" fill="#00e5ff">~</text>
      <text x="278" y="200" fill="#c9d4e3">$ ./scan --profile</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.4s" fill="freeze"/>
    </g>
    <!-- line 4 -->
    <g opacity="0">
      <text x="104" y="230" fill="#39d353" font-weight="bold">&gt; PhishGuard Enterprise</text>
      <text x="338" y="230" fill="#8b98ad">· ML phishing detection · 18 recon scanners</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.4s" fill="freeze"/>
    </g>
    <!-- line 5 -->
    <g opacity="0">
      <text x="104" y="258" fill="#39d353" font-weight="bold">&gt; AI Scam Shield</text>
      <text x="290" y="258" fill="#8b98ad">· Pocketfy · Java projects</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.4s" fill="freeze"/>
    </g>
    <!-- line 6 -->
    <g opacity="0">
      <text x="84" y="298" fill="#3d7aed" font-weight="bold">aman@phishguard</text>
      <text x="250" y="298" fill="#5b6678">:</text>
      <text x="262" y="298" fill="#00e5ff">~</text>
      <text x="278" y="298" fill="#c9d4e3">$ cat skills.txt</text>
      <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.4s" fill="freeze"/>
    </g>
    <!-- line 7 -->
    <g opacity="0">
      <text x="104" y="328" fill="#39d353" font-weight="bold">&gt; Python · Java · JS · PyQt6 · scikit-learn · Node · MySQL</text>
      <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.4s" fill="freeze"/>
    </g>
  </g>

  <!-- blinking cursor on last line -->
  <rect x="104" y="334" width="10" height="18" fill="#39d353">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" begin="5.5s" repeatCount="indefinite"/>
  </rect>

  <!-- status pill -->
  <g opacity="0">
    <rect x="690" y="345" width="220" height="22" rx="11" fill="#0e2a17" stroke="#27c93f" stroke-width="1"/>
    <circle cx="708" cy="356" r="5" fill="#27c93f">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="722" y="360" fill="#39d353" font-size="12" font-weight="bold">OPEN TO INTERNSHIPS</text>
    <animate attributeName="opacity" from="0" to="1" begin="5.9s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
