    <text x="36" y="86" fill="#58a6ff" font-weight="bold">aman@phishguard</text><text x="210" y="86" fill="#8b949e">:</text><text x="224" y="86" fill="#3fb950">~</text><text x="242" y="86" fill="#e6edf3">$ whoami</text>
    <text x="60" y="116" fill="#3fb950" font-weight="bold">&gt; Aman Dalal</text>
    <text x="60" y="140" fill="#8b949e">cybersecurity engineer &amp; threat-tool builder</text>

    <text x="36" y="184" fill="#58a6ff" font-weight="bold">aman@phishguard</text><text x="210" y="184" fill="#8b949e">:</text><text x="224" y="184" fill="#3fb950">~</text><text x="242" y="184" fill="#e6edf3">$ cat focus.txt</text>
    <text x="60" y="214" fill="#3fb950" font-weight="bold">&gt; defensive security tooling</text>
    <text x="60" y="238" fill="#8b949e">ML phishing detection · scam/fraud intel · recon automation</text>
    <text x="60" y="262" fill="#3fb950" font-weight="bold">&gt; hands-on TryHackMe</text>
    <text x="60" y="286" fill="#8b949e">red/blue team labs — ranked operator</text>
    <text x="60" y="310" fill="#3fb950" font-weight="bold">&gt; also builds full-stack</text>
    <text x="60" y="334" fill="#8b949e">Node.js · Java · web apps</text>

    <text x="36" y="378" fill="#58a6ff" font-weight="bold">aman@phishguard</text><text x="210" y="378" fill="#8b949e">:</text><text x="224" y="378" fill="#3fb950">~</text><text x="242" y="378" fill="#e6edf3">$ ls projects/</text>
    <text x="60" y="408" fill="#e6edf3">phishguard-enterprise/  ai-scam-shield/  pocketfy/  java-college/</text>

    <rect x="60" y="422" width="10" height="18" fill="#3fb950"/>
