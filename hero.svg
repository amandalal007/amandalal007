    <text x="58" y="182" fill="#3fb950" font-weight="bold">&gt; defensive security tooling</text>
    <text x="58" y="204" fill="#8b949e">ML phishing detection · scam/fraud intel · recon automation</text>
    <text x="58" y="226" fill="#3fb950" font-weight="bold">&gt; hands-on TryHackMe</text>
