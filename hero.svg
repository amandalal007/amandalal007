    <text x="34" y="456" fill="#58a6ff" font-weight="bold">aman@phishguard</text><text x="208" y="456" fill="#8b949e">:</text><text x="222" y="456" fill="#3fb950">~</text><text x="240" y="456" fill="#e6edf3">$ cat toolset.txt</text>
    <text x="58" y="482" fill="#8b949e">Python · PyQt6 · scikit-learn · VirusTotal · RDAP · Shodan · SQLmap · nmap</text>
