<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="'JetBrains Mono','Fira Code',Consolas,Monaco,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e17"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#1b2230" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="430" fill="url(#bg)"/>
  <rect width="1000" height="430" fill="url(#grid)" opacity="0.5"/>
  <circle cx="850" cy="80" r="120" fill="#3d7aed" opacity="0.10" filter="url(#glow)"/>
  <circle cx="120" cy="360" r="90" fill="#00e5ff" opacity="0.08" filter="url(#glow)"/>

  <rect x="60" y="45" width="880" height="340" rx="14" fill="#0d1117" stroke="#243047" stroke-width="1.5"/>
  <rect x="60" y="45" width="880" height="38" rx="14" fill="#11161f"/>
  <rect x="60" y="69" width="880" height="14" fill="#11161f"/>
  <circle cx="86" cy="64" r="6" fill="#ff5f56"/>
  <circle cx="106" cy="64" r="6" fill="#ffbd2e"/>
  <circle cx="126" cy="64" r="6" fill="#27c93f"/>
  <text x="500" y="69" fill="#5b6678" font-size="13" text-anchor="middle">root@phishguard — zsh — 80x24</text>

  <g fill="#c9d4e3" font-size="17">
    <g opacity="0">
      <text x="84" y="116" fill="#3d7aed" font-weight="bold">root@phishguard</text>
      <text x="262" y="116" fill="#5b6678">:</text>
      <text x="274" y="116" fill="#00e5ff">~</text>
      <text x="290" y="116" fill="#c9d4e3">$ whoami</text>
      <animate attributeName="opacity" from="0" to="1" begin="0.3s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="104" y="146" fill="#39d353" font-weight="bold">&gt; AMAN DALAL</text>
      <text x="270" y="146" fill="#8b98ad">— cybersecurity engineer &amp; threat-tool builder</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="84" y="186" fill="#3d7aed" font-weight="bold">root@phishguard</text>
      <text x="262" y="186" fill="#5b6678">:</text>
      <text x="274" y="186" fill="#00e5ff">~</text>
      <text x="290" y="186" fill="#c9d4e3">$ ./recon --scope self</text>
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="104" y="216" fill="#39d353" font-weight="bold">&gt; Phishing detection</text>
      <text x="300" y="216" fill="#8b98ad">· ML classifiers · VirusTotal · RDAP · 18 scanners</text>
      <animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="104" y="244" fill="#39d353" font-weight="bold">&gt; Scam &amp; fraud intel</text>
      <text x="328" y="244" fill="#8b98ad">· multi-modal analysis · IOC hunting</text>
      <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="104" y="272" fill="#39d353" font-weight="bold">&gt; TryHackMe</text>
      <text x="256" y="272" fill="#8b98ad">· active red/blue team labs · ranked operator</text>
      <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="84" y="312" fill="#3d7aed" font-weight="bold">root@phishguard</text>
      <text x="262" y="312" fill="#5b6678">:</text>
      <text x="274" y="312" fill="#00e5ff">~</text>
      <text x="290" y="312" fill="#c9d4e3">$ cat toolset.txt</text>
      <animate attributeName="opacity" from="0" to="1" begin="5.1s" dur="0.4s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="104" y="342" fill="#39d353" font-weight="bold">&gt; Python · PyQt6 · scikit-learn · DNS/SSL · Shodan · SQLmap · nmap</text>
      <animate attributeName="opacity" from="0" to="1" begin="5.9s" dur="0.4s" fill="freeze"/>
    </g>
  </g>

  <rect x="104" y="348" width="10" height="18" fill="#39d353">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" begin="6.3s" repeatCount="indefinite"/>
  </rect>

  <g opacity="0">
    <rect x="60" y="398" width="215" height="22" rx="11" fill="#0e2a17" stroke="#27c93f" stroke-width="1"/>
    <circle cx="80" cy="409" r="5" fill="#27c93f">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="94" y="413" fill="#39d353" font-size="12" font-weight="bold">OPEN TO SECURITY ROLES</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.7s" dur="0.5s" fill="freeze"/>
  </g>
  <g opacity="0">
    <rect x="290" y="398" width="190" height="22" rx="11" fill="#1a1305" stroke="#ffbd2e" stroke-width="1"/>
    <circle cx="310" cy="409" r="5" fill="#ffbd2e">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <text x="324" y="413" fill="#ffd966" font-size="12" font-weight="bold">TRYHACKME: ACTIVE</text>
    <animate attributeName="opacity" from="0" to="1" begin="6.7s" dur="0.5s" fill="freeze"/>
  </g>
</svg>
